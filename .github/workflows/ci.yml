name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Python Backend Tests ────────────────────────────────────────────────────
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest

    env:
      # Minimal env so config.py doesn't crash in CI
      MONGODB_URI: mongodb://localhost:27017/jobflow_test
      DEEPSEEK_API_KEY: sk-test-placeholder
      GOOGLE_API_KEY: AIza-test-placeholder
      SERPER_API_KEY: test-placeholder
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # ── Next.js Frontend Build ──────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Type check
        working-directory: webapp
        run: npx tsc --noEmit

      - name: Build
        working-directory: webapp
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          FASTAPI_URL: http://localhost:8000
        run: npm run build
